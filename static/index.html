<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local LLM Productivity</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #faf9f5;
      --bg-secondary: #F5F4EF;
      --bg-card: #ffffff;
      --text-primary: #141413;
      --text-secondary: #5c5c5a;
      --text-muted: #8c8c8a;
      --accent: #D97757;
      --accent-hover: #c4684a;
      --accent-subtle: rgba(217, 119, 87, 0.08);
      --border: #e5e4df;
      --border-light: #eeeee9;
      --shadow: rgba(20, 20, 19, 0.04);
      --shadow-hover: rgba(20, 20, 19, 0.08);
      --green: #3a9a6e;
      --red: #c44;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      line-height: 1.5;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }

    /* ── Nav tabs ── */
    .main-nav {
      display: flex;
      gap: 2px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 10px;
      flex: 1;
      max-width: 560px;
    }

    .main-nav button {
      flex: 1;
      background: transparent;
      border: none;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      border-radius: 7px;
      cursor: pointer;
      font-family: inherit;
      transition: color 0.15s;
      white-space: nowrap;
    }

    .main-nav button:hover { color: var(--text-primary); }

    .main-nav button.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: 0 1px 4px var(--shadow);
    }

    /* ── Status ── */
    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: var(--text-muted);
      flex-shrink: 0;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); transition: background 0.3s;
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); }

    /* ── Panel system ── */
    .panel { display: none; flex: 1; min-height: 0; flex-direction: column; overflow: hidden; }
    .panel.active { display: flex; }

    /* ══════════════════════════════════════
       TASKS — kanban board
    ══════════════════════════════════════ */

    .board-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .board-toolbar input {
      flex: 1; max-width: 340px;
      padding: 8px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 14px;
      background: var(--bg-card);
      transition: border-color 0.15s;
    }
    .board-toolbar input:focus { outline: none; border-color: var(--accent); }

    .btn {
      background: var(--accent); color: white; border: none;
      padding: 8px 16px; border-radius: 8px; font-size: 13px;
      cursor: pointer; font-family: inherit; font-weight: 500;
      white-space: nowrap; transition: background 0.15s, transform 0.1s;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: var(--bg-card); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg-secondary); }

    /* Extract area */
    .extract-area {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-secondary);
      flex-shrink: 0;
    }
    .extract-area textarea {
      width: 100%; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: inherit; font-size: 14px;
      background: var(--bg-card); resize: vertical; min-height: 70px;
      transition: border-color 0.15s;
    }
    .extract-area textarea:focus { border-color: var(--accent); outline: none; }
    .extract-buttons { margin-top: 8px; display: flex; gap: 8px; }

    /* Extract progress */
    .extract-progress { display:none; margin-top:12px; flex-direction:column; gap:8px; }
    .extract-progress.visible { display:flex; }
    .extract-progress-bar-wrap { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .extract-progress-bar-fill { height:100%; width:0%; background:var(--accent); border-radius:3px; transition:width 0.4s ease; }
    .extract-log {
      font-family:'SF Mono','Fira Code',ui-monospace,monospace;
      font-size:11.5px; line-height:1.6; color:var(--text-secondary);
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:8px; padding:8px 12px; max-height:112px; overflow-y:auto;
    }
    .extract-log-line { white-space:pre; }
    .extract-log-line.log-done   { color:var(--green); }
    .extract-log-line.log-error  { color:#e55; }
    .extract-log-line.log-running { color:var(--accent); font-style:italic; }

    /* Board */
    .board {
      display: flex;
      gap: 16px;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 16px 24px 20px;
      min-height: 0;
      align-items: flex-start;
    }

    .board-column {
      background: var(--bg-secondary);
      border-radius: 12px;
      min-width: 340px;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      max-height: 100%;
    }

    .column-header {
      padding: 14px 16px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .column-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
    }

    .column-count {
      background: var(--bg-card);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .column-cards {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 8px;
    }

    .task-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 10px;
      box-shadow: 0 1px 3px var(--shadow);
      transition: box-shadow 0.15s;
      position: relative;
    }
    .task-card:hover { box-shadow: 0 4px 14px var(--shadow-hover); }
    .task-card.is-done { opacity: 0.65; }

    .task-card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .task-card input[type="checkbox"] {
      margin-top: 3px; accent-color: var(--accent);
      width: 16px; height: 16px; cursor: pointer; flex-shrink: 0;
    }

    .task-card-body { flex: 1; min-width: 0; }

    /* Assignee badge (Waiting On tasks: "Aaron: ...") */
    .task-assignee {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      background: var(--accent-subtle);
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .task-card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.5;
      color: var(--text-primary);
    }
    .task-card-title.done {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    /* Full note: "— description. `Meeting · Date`" shown as one block */
    .task-card-note {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    .task-card-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border-light);
    }

    .task-card-actions select {
      flex: 1;
      font-size: 11px; padding: 3px 6px;
      border: 1px solid var(--border); border-radius: 5px;
      background: var(--bg-primary); color: var(--text-muted);
      cursor: pointer; font-family: inherit;
    }

    .task-delete-btn {
      background: transparent; border: none;
      color: var(--text-muted); cursor: pointer;
      font-size: 16px; line-height: 1; padding: 2px 6px;
      border-radius: 4px; transition: color 0.15s;
    }
    .task-delete-btn:hover { color: var(--red); }

    /* Column add-task input */
    .column-add {
      padding: 8px 10px 10px;
      flex-shrink: 0;
    }

    .column-add-btn {
      width: 100%;
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      padding: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s, color 0.15s;
    }
    .column-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    .column-add-input {
      width: 100%;
      background: var(--bg-card);
      border: 2px solid var(--accent);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-primary);
      resize: none;
      display: none;
    }
    .column-add-input:focus { outline: none; }
    .column-add-hint {
      font-size: 11px; color: var(--text-muted);
      margin-top: 4px; display: none;
    }

    /* ══════════════════════════════════════
       MEMORY panel
    ══════════════════════════════════════ */

    .memory-layout {
      display: grid;
      grid-template-columns: 190px 1fr;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    .memory-sidebar {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 14px 10px 14px 16px;
    }

    .memory-main {
      display: flex;
      flex-direction: column;
      padding: 14px 20px;
      gap: 10px;
      overflow: hidden;
    }

    .memory-file-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .memory-file-name { font-size: 13px; color: var(--text-muted); flex: 1; }

    .dirty-badge {
      font-size: 11px; padding: 2px 7px; border-radius: 4px;
      background: var(--accent-subtle); color: var(--accent);
      font-weight: 500; display: none;
    }
    .dirty-badge.visible { display: inline; }

    .memory-file-item {
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
      font-size: 13px; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background 0.1s;
    }
    .memory-file-item:hover { background: var(--bg-secondary); }
    .memory-file-item.active { background: var(--accent-subtle); color: var(--accent); font-weight: 500; }

    .memory-dir-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.07em; color: var(--text-muted);
      padding: 12px 10px 4px; display: block;
    }

    .memory-editor {
      flex: 1;
      width: 100%; padding: 12px;
      border: 1px solid var(--border); border-radius: 8px;
      font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
      background: var(--bg-card); resize: none; line-height: 1.6;
      transition: border-color 0.15s;
    }
    .memory-editor:focus { outline: none; border-color: var(--accent); }
    .memory-editor:disabled { opacity: 0.45; }

    /* ══════════════════════════════════════
       DECODE / SEARCH / CHAT panels
    ══════════════════════════════════════ */

    .tool-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      gap: 14px;
      overflow: hidden;
    }

    .tool-panel textarea,
    .tool-panel input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 14px;
      background: var(--bg-card); transition: border-color 0.15s;
    }
    .tool-panel textarea { resize: vertical; min-height: 90px; }
    .tool-panel textarea:focus,
    .tool-panel input[type="text"]:focus { outline: none; border-color: var(--accent); }

    .tool-result {
      flex: 1;
      background: var(--bg-secondary);
      border-radius: 10px;
      padding: 16px;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-y: auto;
      line-height: 1.65;
    }
    .tool-result.error { background: #fff5f5; color: var(--red); }

    /* Chat */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-msg {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      border: 1px solid var(--border-light);
    }
    .chat-msg-user {
      background: #f0ede8;
      border-color: var(--border);
    }
    .chat-msg-assistant {
      background: var(--bg-card);
      box-shadow: 0 1px 3px var(--shadow);
    }
    .chat-msg-role {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 5px;
    }
    .chat-msg-user .chat-msg-role { color: var(--accent); }
    .chat-msg-assistant .chat-msg-role { color: var(--text-muted); }
    .chat-msg-error { background: #fff5f5; border-color: #fcc; }
    .chat-msg-error .chat-msg-role { color: var(--red); }
    .chat-msg-text { color: var(--text-primary); white-space: pre-wrap; }

    .chat-input-row {
      display: flex; gap: 8px; flex-shrink: 0;
    }
    .chat-input-row input {
      flex: 1; padding: 10px 16px;
      border: 1px solid var(--border); border-radius: 10px;
      font-family: inherit; font-size: 14px; background: var(--bg-card);
      transition: border-color 0.15s;
    }
    .chat-input-row input:focus { outline: none; border-color: var(--accent); }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--text-primary); color: white;
      padding: 10px 18px; border-radius: 8px; font-size: 13px;
      opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-col {
      text-align: center; padding: 32px 16px;
      color: var(--text-muted); font-size: 12px;
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <h1>Productivity</h1>
  </div>

  <nav class="main-nav">
    <button class="active" data-panel="tasks">Tasks</button>
    <button data-panel="memory">Memory</button>
    <button data-panel="decode">Decode</button>
    <button data-panel="search">Search</button>
    <button data-panel="chat">Chat</button>
    <button data-panel="logs">Logs</button>
  </nav>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Checking...</span>
  </div>
</header>

<!-- ══════════════════════════════════════
     TASKS PANEL
══════════════════════════════════════ -->
<div class="panel active" id="panel-tasks">

  <div class="board-toolbar">
    <input type="text" id="quickTaskInput" placeholder="Quick-add a task to Active…" />
    <button class="btn" onclick="quickAddTask()">Add</button>
    <button class="btn btn-secondary" id="extractToggleBtn" onclick="toggleExtract()">Extract</button>
  </div>

  <div class="extract-area" id="extractArea" style="display:none;">
    <textarea id="extractText" placeholder="Paste meeting notes, emails, or any text — the LLM will extract tasks…"></textarea>
    <div class="extract-buttons">
      <button class="btn" id="extractBtn" onclick="extractTasks()">Extract Tasks</button>
      <button class="btn btn-secondary" onclick="toggleExtract()">Cancel</button>
    </div>
    <div class="extract-progress" id="extractProgress">
      <div class="extract-progress-bar-wrap">
        <div class="extract-progress-bar-fill" id="extractProgressFill"></div>
      </div>
      <div class="extract-log" id="extractLog"></div>
    </div>
  </div>

  <div class="board" id="board">
    <!-- columns rendered by JS -->
  </div>
</div>

<!-- ══════════════════════════════════════
     MEMORY PANEL
══════════════════════════════════════ -->
<div class="panel" id="panel-memory">
  <div class="memory-layout">
    <div class="memory-sidebar" id="memoryTree"></div>
    <div class="memory-main">
      <div class="memory-file-header">
        <span class="memory-file-name" id="memoryFileName">Select a file</span>
        <span class="dirty-badge" id="dirtyBadge">Unsaved</span>
      </div>
      <textarea class="memory-editor" id="memoryEditor"
        placeholder="Select a file to view/edit…" disabled></textarea>
      <button class="btn" id="memorySaveBtn" onclick="saveMemory()" disabled
        style="align-self:flex-start; flex-shrink:0;">Save</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     DECODE PANEL
══════════════════════════════════════ -->
<div class="panel" id="panel-decode">
  <div class="tool-panel">
    <textarea id="decodeInput"
      placeholder='Paste shorthand text (e.g. "ask todd about the PSR for phoenix")'></textarea>
    <div>
      <button class="btn" id="decodeBtn" onclick="decode()">Decode</button>
    </div>
    <div id="decodeResult" style="flex:1; display:flex; flex-direction:column; overflow:hidden;"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     SEARCH PANEL
══════════════════════════════════════ -->
<div class="panel" id="panel-search">
  <div class="tool-panel">
    <input type="text" id="searchInput" placeholder="Search memory…" />
    <div>
      <button class="btn" onclick="searchMemory()">Search</button>
    </div>
    <div id="searchResult" style="flex:1; display:flex; flex-direction:column; overflow:hidden;"></div>
  </div>
</div>

<!-- ══════════════════════════════════════
     CHAT PANEL
══════════════════════════════════════ -->
<div class="panel" id="panel-chat">
  <div class="tool-panel">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-row">
      <input type="text" id="chatInput" placeholder="Ask something…"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}" />
      <button class="btn" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════
     LOGS PANEL
══════════════════════════════════════ -->
<div class="panel" id="panel-logs">
  <div class="tool-panel">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-shrink:0;">
      <h2 style="font-size:14px; font-weight:600; color:var(--text-secondary); margin:0;">Extraction Log</h2>
      <button class="btn btn-secondary" style="font-size:12px; padding:5px 12px;" onclick="loadLogs()">Refresh</button>
    </div>
    <div id="logsContainer" style="flex:1; overflow-y:auto; margin-top:8px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── State ──────────────────────────────────────────────
  let tasksData = null;
  let currentMemoryFile = null;
  let memoryDirty = false;

  // --- Extract progress state ---
  let _pollInterval   = null;
  let _extractStart   = null;
  let _lastDoneChunks = 0;
  let _runningLineEl  = null;

  const SECTIONS = [
    { id: 'active',  label: 'Active' },
    { id: 'waiting', label: 'Waiting On' },
    { id: 'someday', label: 'Someday' },
    { id: 'done',    label: 'Done' },
  ];

  // ── Nav switching ──────────────────────────────────────
  document.querySelector('.main-nav').addEventListener('click', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    document.querySelectorAll('.main-nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    if (btn.dataset.panel === 'logs') loadLogs();
  });

  // ── Health check ───────────────────────────────────────
  async function checkHealth() {
    try {
      const r = await fetch('/api/health');
      const d = await r.json();
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      if (d.status === 'connected') {
        dot.classList.add('connected');
        txt.textContent = d.models?.[0] || 'Connected';
      } else {
        dot.classList.remove('connected');
        txt.textContent = 'Disconnected';
      }
    } catch {
      document.getElementById('statusDot').classList.remove('connected');
      document.getElementById('statusText').textContent = 'Offline';
    }
  }

  // ── Toast ──────────────────────────────────────────────
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2500);
  }

  // ── Utility ────────────────────────────────────────────
  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ══════════════════════════════════════════════════════
  // TASKS
  // ══════════════════════════════════════════════════════

  async function loadTasks() {
    const r = await fetch('/api/tasks');
    tasksData = await r.json();
    renderBoard();
  }

  function renderBoard() {
    const board = document.getElementById('board');
    board.innerHTML = '';

    SECTIONS.forEach(sec => {
      const tasks = tasksData?.sections?.[sec.id] || [];
      const col = document.createElement('div');
      col.className = 'board-column';
      col.dataset.section = sec.id;

      col.innerHTML = `
        <div class="column-header">
          <span class="column-title">${sec.label}</span>
          <span class="column-count" id="count-${sec.id}">${tasks.length}</span>
        </div>
        <div class="column-cards" id="cards-${sec.id}">
          ${tasks.length === 0
            ? `<div class="empty-col">No tasks</div>`
            : tasks.map(t => renderCard(t, sec.id)).join('')}
        </div>
        <div class="column-add">
          <button class="column-add-btn" onclick="showColInput('${sec.id}')">+ Add task</button>
          <textarea class="column-add-input" id="col-input-${sec.id}"
            rows="2" placeholder="Task title… (Enter to add)"
            onkeydown="handleColInputKey(event,'${sec.id}')"></textarea>
          <div class="column-add-hint" id="col-hint-${sec.id}">Enter to add · Esc to cancel</div>
        </div>
      `;

      board.appendChild(col);
    });
  }

  // Parse "Person: task title" prefix for Waiting On cards
  function parseAssignee(title, sectionId) {
    if (sectionId !== 'waiting') return { assignee: null, title };
    const m = title.match(/^([A-Z][^:]{0,30}):\s*(.+)$/);
    if (m) return { assignee: m[1].trim(), title: m[2].trim() };
    return { assignee: null, title };
  }

  // Build the note line: "— description. `Meeting · Date`"
  // Context already contains the full text including backtick tag.
  // Done tasks have context like "(2026-03-25)" — show as "Completed YYYY-MM-DD".
  function buildNote(context, isDone) {
    if (!context) return null;
    if (isDone) {
      const d = context.match(/^\((\d{4}-\d{2}-\d{2})\)$/);
      if (d) return `Completed ${d[1]}`;
    }
    // Strip any leading separator chars the parser left on the context
    const clean = context.replace(/^[-–—\s]+/, '').trim();
    return clean ? `\u2014 ${clean}` : null;  // em dash prefix
  }

  function renderCard(t, sectionId) {
    const { assignee, title } = parseAssignee(t.title, sectionId);
    const note = buildNote(t.context, t.done);

    const assigneeBadge = assignee
      ? `<div class="task-assignee">${esc(assignee)}</div>` : '';

    const noteHtml = note
      ? `<div class="task-card-note">${esc(note)}</div>` : '';

    return `
      <div class="task-card ${t.done ? 'is-done' : ''}" id="card-${t.id}">
        <div class="task-card-top">
          <input type="checkbox" ${t.done ? 'checked' : ''}
            onchange="toggleTask('${t.id}')" />
          <div class="task-card-body">
            ${assigneeBadge}
            <div class="task-card-title ${t.done ? 'done' : ''}">${esc(title)}</div>
            ${noteHtml}
          </div>
          <button class="task-delete-btn" onclick="deleteTask('${t.id}')"
            title="Delete">&times;</button>
        </div>
        <div class="task-card-actions">
          <select onchange="moveTask('${t.id}', this.value)">
            <option value="" disabled selected>Move to…</option>
            ${SECTIONS.map(s => `<option value="${s.id}">${s.label}</option>`).join('')}
          </select>
        </div>
      </div>`;
  }

  function showColInput(sectionId) {
    document.querySelector(`[data-section="${sectionId}"] .column-add-btn`).style.display = 'none';
    const inp = document.getElementById('col-input-' + sectionId);
    const hint = document.getElementById('col-hint-' + sectionId);
    inp.style.display = 'block';
    hint.style.display = 'block';
    inp.focus();
  }

  function hideColInput(sectionId) {
    document.querySelector(`[data-section="${sectionId}"] .column-add-btn`).style.display = '';
    const inp = document.getElementById('col-input-' + sectionId);
    const hint = document.getElementById('col-hint-' + sectionId);
    inp.style.display = 'none';
    hint.style.display = 'none';
    inp.value = '';
  }

  async function handleColInputKey(e, sectionId) {
    if (e.key === 'Escape') { hideColInput(sectionId); return; }
    if (e.key === 'Enter') {
      e.preventDefault();
      const inp = document.getElementById('col-input-' + sectionId);
      const title = inp.value.trim();
      if (!title) return;
      await fetch('/api/tasks', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ title, section: sectionId }),
      });
      await loadTasks();
      toast('Task added');
    }
  }

  // Quick-add from toolbar (goes to Active)
  async function quickAddTask() {
    const inp = document.getElementById('quickTaskInput');
    const title = inp.value.trim();
    if (!title) return;
    await fetch('/api/tasks', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ title, section: 'active' }),
    });
    inp.value = '';
    await loadTasks();
    toast('Task added');
  }

  document.getElementById('quickTaskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') quickAddTask();
  });

  async function toggleTask(id) {
    await fetch(`/api/tasks/${id}/toggle`, { method: 'PUT' });
    await loadTasks();
  }

  async function moveTask(id, section) {
    if (!section) return;
    await fetch(`/api/tasks/${id}/move`, {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ section }),
    });
    await loadTasks();
    toast('Task moved');
  }

  async function deleteTask(id) {
    await fetch(`/api/tasks/${id}`, { method: 'DELETE' });
    await loadTasks();
    toast('Task deleted');
  }

  // ══════════════════════════════════════════════════════
  // EXTRACT PROGRESS
  // ══════════════════════════════════════════════════════

  function fmtTime(d) { return (d instanceof Date ? d : new Date(d)).toTimeString().slice(0,8); }
  function fmtDur(s) {
    s = Math.round(s);
    if (s < 60) return `${s}s`;
    const m = Math.floor(s / 60), r = s % 60;
    return r > 0 ? `${m}m ${r}s` : `${m}m`;
  }

  function appendLog(text, cls) {
    const log = document.getElementById('extractLog');
    const el = document.createElement('div');
    el.className = 'extract-log-line' + (cls ? ' ' + cls : '');
    el.textContent = text;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
    return el;
  }

  function updateProgressBar(done, total) {
    document.getElementById('extractProgressFill').style.width =
      (total > 0 ? Math.round(done / total * 100) : 0) + '%';
  }

  function showProgressPanel() {
    document.getElementById('extractProgress').classList.add('visible');
    document.getElementById('extractLog').innerHTML = '';
  }

  function hideProgressPanel() {
    document.getElementById('extractProgress').classList.remove('visible');
  }

  function stopProgressPolling() {
    if (_pollInterval) { clearInterval(_pollInterval); _pollInterval = null; }
    _runningLineEl = null;
  }

  function applyStatusUpdate(s) {
    if (s.phase === 'idle') return;
    if (s.phase === 'running' || s.phase === 'done') {
      const total = s.total_chunks;
      const newChunks = (s.chunks || []).slice(_lastDoneChunks);
      newChunks.forEach(c => {
        if (_runningLineEl) { _runningLineEl.remove(); _runningLineEl = null; }
        appendLog(
          `[${fmtTime(new Date())}] Chunk ${c.index}/${total} done — ${c.tasks_found} task${c.tasks_found !== 1 ? 's' : ''} · ${c.tokens.toLocaleString()} tokens · ${fmtDur(c.elapsed_seconds)}`,
          'log-done'
        );
      });
      _lastDoneChunks = (s.chunks || []).length;
      updateProgressBar(s.done_chunks, total);
      if (s.phase === 'running') {
        const next = s.done_chunks + 1;
        const txt = `[${fmtTime(new Date())}] Chunk ${next}/${total} running…`;
        if (_runningLineEl) _runningLineEl.textContent = txt;
        else _runningLineEl = appendLog(txt, 'log-running');
      }
      if (s.phase === 'done') {
        stopProgressPolling();
        appendLog(`[${fmtTime(new Date())}] Done — ${s.extracted} task${s.extracted !== 1 ? 's' : ''} · ${fmtDur(s.duration_seconds)} total`, 'log-done');
        updateProgressBar(total, total);
      }
    }
    if (s.phase === 'error') {
      stopProgressPolling();
      appendLog(`[${fmtTime(new Date())}] Error: ${s.message}`, 'log-error');
    }
  }

  function startProgressPolling() {
    _lastDoneChunks = 0;
    _runningLineEl = null;
    _extractStart = Date.now();
    showProgressPanel();
    _pollInterval = setInterval(async () => {
      try {
        const r = await fetch('/api/extract/status');
        applyStatusUpdate(await r.json());
      } catch {}
    }, 2000);
  }

  // Extract
  function toggleExtract() {
    const el = document.getElementById('extractArea');
    const btn = document.getElementById('extractToggleBtn');
    const isOpen = el.style.display !== 'none';
    if (isOpen) { stopProgressPolling(); hideProgressPanel(); }
    el.style.display = isOpen ? 'none' : '';
    btn.textContent = isOpen ? 'Extract' : 'Cancel';
  }

  async function extractTasks() {
    const text = document.getElementById('extractText').value.trim();
    if (!text) return;
    const btn = document.getElementById('extractBtn');
    btn.disabled = true;
    const chunkCount = Math.ceil(text.length / 12000);
    btn.innerHTML = chunkCount > 1
      ? `<span class="spinner"></span> Extracting… (${chunkCount} chunks)`
      : `<span class="spinner"></span> Extracting…`;
    startProgressPolling();
    appendLog(`[${fmtTime(new Date())}] Starting — ${chunkCount} chunk${chunkCount !== 1 ? 's' : ''}, ${(text.length / 1000).toFixed(1)}k chars`);
    try {
      const r = await fetch('/api/tasks/extract', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Extraction failed');
      // Force one final status read to ensure done line appears
      try { applyStatusUpdate(await (await fetch('/api/extract/status')).json()); } catch {}
      toast(`Extracted ${d.extracted} task(s)`);
      document.getElementById('extractText').value = '';
      await loadTasks();
      setTimeout(() => { toggleExtract(); hideProgressPanel(); }, 3000);
    } catch (e) {
      stopProgressPolling();
      appendLog(`[${fmtTime(new Date())}] Error: ${e.message}`, 'log-error');
      toast('Error: ' + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Extract Tasks';
    }
  }

  // ══════════════════════════════════════════════════════
  // MEMORY
  // ══════════════════════════════════════════════════════

  async function loadMemoryTree() {
    const r = await fetch('/api/memory');
    const files = await r.json();
    const container = document.getElementById('memoryTree');
    const dirs = {};
    files.forEach(f => {
      const dir = f.directory || 'root';
      if (!dirs[dir]) dirs[dir] = [];
      dirs[dir].push(f);
    });
    const order = ['root', 'people', 'projects', 'context'];
    const allDirs = [...new Set([...order, ...Object.keys(dirs)])];
    let html = '';
    allDirs.forEach(dir => {
      if (!dirs[dir]) return;
      if (dir !== 'root') html += `<span class="memory-dir-label">${esc(dir)}</span>`;
      dirs[dir].forEach(f => {
        const active = currentMemoryFile === f.path ? ' active' : '';
        html += `<div class="memory-file-item${active}" onclick="openMemory('${esc(f.path)}')"
          title="${esc(f.path)}">${esc(f.name)}</div>`;
      });
    });
    container.innerHTML = html;
  }

  async function openMemory(path) {
    if (memoryDirty && !confirm('You have unsaved changes. Discard them?')) return;
    currentMemoryFile = path;
    const r = await fetch('/api/memory/' + path);
    const d = await r.json();
    const editor = document.getElementById('memoryEditor');
    editor.value = d.content;
    editor.disabled = false;
    document.getElementById('memorySaveBtn').disabled = false;
    document.getElementById('memoryFileName').textContent = path;
    setDirty(false);
    loadMemoryTree();
  }

  function setDirty(isDirty) {
    memoryDirty = isDirty;
    document.getElementById('dirtyBadge').classList.toggle('visible', isDirty);
  }

  document.getElementById('memoryEditor').addEventListener('input', () => {
    if (currentMemoryFile) setDirty(true);
  });

  async function saveMemory() {
    if (!currentMemoryFile) return;
    await fetch('/api/memory', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ path: currentMemoryFile, content: document.getElementById('memoryEditor').value }),
    });
    setDirty(false);
    toast('Saved');
  }

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 's' && currentMemoryFile) {
      e.preventDefault();
      saveMemory();
    }
  });

  // ══════════════════════════════════════════════════════
  // DECODE
  // ══════════════════════════════════════════════════════

  async function decode() {
    const text = document.getElementById('decodeInput').value.trim();
    if (!text) return;
    const btn = document.getElementById('decodeBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Decoding…';
    const resultEl = document.getElementById('decodeResult');
    try {
      const r = await fetch('/api/memory/decode', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Decode failed');
      resultEl.innerHTML = `<div class="tool-result">${esc(d.decoded)}</div>`;
    } catch (e) {
      resultEl.innerHTML = `<div class="tool-result error">${esc(e.message)}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Decode';
    }
  }

  // ══════════════════════════════════════════════════════
  // SEARCH
  // ══════════════════════════════════════════════════════

  async function searchMemory() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) return;
    const resultEl = document.getElementById('searchResult');
    resultEl.innerHTML = '<div style="padding:8px;"><span class="spinner"></span></div>';
    try {
      const r = await fetch('/api/memory/search', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ query }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Search failed');
      resultEl.innerHTML = `<div class="tool-result">${esc(d.results)}</div>`;
    } catch (e) {
      resultEl.innerHTML = `<div class="tool-result error">${esc(e.message)}</div>`;
    }
  }

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchMemory();
  });

  // ══════════════════════════════════════════════════════
  // CHAT
  // ══════════════════════════════════════════════════════

  function appendMsg(role, text, isError) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `chat-msg ${isError ? 'chat-msg-error' : 'chat-msg-' + role}`;
    div.innerHTML = `
      <div class="chat-msg-role">${isError ? 'Error' : role === 'user' ? 'You' : 'Assistant'}</div>
      <div class="chat-msg-text">${esc(text)}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }

  async function sendChat() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';

    appendMsg('user', msg);

    const pending = document.createElement('div');
    pending.className = 'chat-msg chat-msg-assistant';
    pending.innerHTML = `<div class="chat-msg-role">Assistant</div>
      <div class="chat-msg-text"><span class="spinner"></span> Thinking…</div>`;
    const container = document.getElementById('chatMessages');
    container.appendChild(pending);
    container.scrollTop = container.scrollHeight;

    try {
      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg }),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.detail || 'Chat failed');
      pending.querySelector('.chat-msg-text').textContent = d.response;
    } catch (e) {
      pending.className = 'chat-msg chat-msg-error';
      pending.querySelector('.chat-msg-role').textContent = 'Error';
      pending.querySelector('.chat-msg-text').textContent = e.message;
    }
    container.scrollTop = container.scrollHeight;
  }

  // ══════════════════════════════════════════════════════
  // LOGS
  // ══════════════════════════════════════════════════════

  function formatLogEntry(e) {
    const d = new Date(e.timestamp + 'Z');
    const dateStr = d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
    const timeStr = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
    const modelShort = (e.model || 'unknown').split('/').pop();
    const tokens = (e.total_tokens || 0).toLocaleString();
    const ptok = (e.prompt_tokens || 0).toLocaleString();
    const ctok = (e.completion_tokens || 0).toLocaleString();
    return `
      <div style="background:var(--bg-card);border:1px solid var(--border-light);
                  border-radius:10px;padding:14px 16px;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
          <span style="font-size:13px;font-weight:600;color:var(--text-primary);">
            ${esc(dateStr)} at ${esc(timeStr)}
          </span>
          <span style="font-size:11px;color:var(--text-muted);">${esc(modelShort)}</span>
        </div>
        <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--text-secondary);">
          <span>${e.action_items} action item${e.action_items !== 1 ? 's' : ''}</span>
          <span>${e.duration_seconds}s</span>
          <span>${tokens} tokens <span style="color:var(--text-muted);">(${ptok} in + ${ctok} out)</span></span>
          <span>${e.chunks} chunk${e.chunks !== 1 ? 's' : ''}</span>
          <span>${((e.input_chars || 0) / 1000).toFixed(1)}k chars</span>
        </div>
      </div>`;
  }

  async function loadLogs() {
    const container = document.getElementById('logsContainer');
    container.innerHTML = '<div style="padding:8px;"><span class="spinner"></span></div>';
    try {
      const r = await fetch('/api/logs?limit=50');
      const entries = await r.json();
      if (!entries.length) {
        container.innerHTML = '<div style="padding:16px;color:var(--text-muted);font-size:13px;">No extractions logged yet.</div>';
        return;
      }
      container.innerHTML = entries.map(formatLogEntry).join('');
    } catch (e) {
      container.innerHTML = `<div style="padding:16px;color:#e55;font-size:13px;">Failed to load logs: ${esc(e.message)}</div>`;
    }
  }

  // ── Init ──────────────────────────────────────────────
  checkHealth();
  setInterval(checkHealth, 15000);
  loadTasks();
  loadMemoryTree();
</script>
</body>
</html>
